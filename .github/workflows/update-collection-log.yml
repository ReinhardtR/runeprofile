name: Update Collection Log

on:
  schedule:
    # Every Wednesday at 11:35 UTC (after the weekly OSRS game update)
    - cron: "35 11 * * 3"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-collection-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update @abextm/cache2 to latest
        run: pnpm --filter ts-scripts update @abextm/cache2

      - name: Update collection log
        run: pnpm script:update-clog

      - name: Read change summary
        id: summary
        run: |
          if [ -f /tmp/clog-changes-summary.txt ]; then
            {
              echo "body<<EOF"
              echo "This PR was automatically generated by the **Update Collection Log** workflow."
              echo ""
              cat /tmp/clog-changes-summary.txt
              echo ""
              echo "---"
              echo ""
              echo "### Review Checklist"
              echo ""
              echo "- [ ] New pages have correct \`hiscore\` mappings added"
              echo "- [ ] New pages have appropriate \`aliases\` added"
              echo "- [ ] Item names and IDs look correct"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.summary.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-collection-log
          commit-message: "chore: update collection log data from OSRS cache"
          title: "chore: update collection log data"
          body: ${{ steps.summary.outputs.body }}
          labels: automated
          delete-branch: true
