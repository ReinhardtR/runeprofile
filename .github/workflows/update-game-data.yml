name: Update Game Data

on:
  schedule:
    # Every Wednesday at 11:35 UTC (after the weekly OSRS game update)
    - cron: "35 11 * * 3"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-game-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Each step regenerates one data file from its upstream source and writes a
      # /tmp/<name>-changes-summary.txt only when it finds changes. Scripts exit
      # non-zero on real errors so a failure fails the run loudly (no silent PR).
      - name: Update collection log
        run: pnpm script:update-clog

      - name: Update combat achievements
        run: pnpm script:update-ca

      - name: Update quests
        run: pnpm script:update-quests

      - name: Build PR body
        id: summary
        run: |
          body_file="$(mktemp)"
          has_changes=false
          {
            echo "This PR was automatically generated by the **Update Game Data** workflow."
            echo ""
          } >> "$body_file"
          for f in \
            /tmp/clog-changes-summary.txt \
            /tmp/ca-changes-summary.txt \
            /tmp/quests-changes-summary.txt; do
            if [ -f "$f" ]; then
              cat "$f" >> "$body_file"
              echo "" >> "$body_file"
              has_changes=true
            fi
          done
          if [ "$has_changes" = "true" ]; then
            {
              echo "body<<EOF"
              cat "$body_file"
              echo ""
              echo "---"
              echo ""
              echo "Review the per-section notes above for fields that must be filled in manually (e.g. collection log \`hiscore\`/\`aliases\`, quest \`points\`/\`type\`)."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.summary.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-game-data
          commit-message: "chore: update game data from OSRS cache & RuneLite"
          title: "chore: update game data"
          body: ${{ steps.summary.outputs.body }}
          labels: automated
          delete-branch: true
